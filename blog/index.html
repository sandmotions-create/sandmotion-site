  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --black: #080808; --white: #f5f4f0; --accent: #c9a96e; --muted: rgba(245,244,240,0.42); --font-display: 'Cormorant Garamond', serif; --font-body: 'Montserrat', sans-serif; }
    body { background: var(--black); color: var(--white); font-family: var(--font-body); }
    
    /* NAV - Pointing back to root */
    nav { padding: 3rem 4rem; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-family: var(--font-display); font-size: 1.35rem; color: var(--white); text-decoration: none; }
    .nav-link { font-size: 0.65rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); text-decoration: none; }
    
    /* BLOG LIST */
    .container { max-width: 650px; margin: 6rem auto; padding: 0 2rem; }
    h1 { font-family: var(--font-display); font-size: 3rem; margin-bottom: 4rem; font-weight: 300; }
    ul { list-style: none; }
    li { margin-bottom: 2rem; }
    a { font-family: var(--font-display); font-size: 1.5rem; color: var(--white); text-decoration: none; border-bottom: 1px solid rgba(201,169,110,0.3); transition: color 0.3s; }
    a:hover { color: var(--accent); }
  </style>
</head>
